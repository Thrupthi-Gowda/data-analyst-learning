<!DOCTYPE html>
<html>
<head>
    <title>Warehouse Inventory</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        .container {
            width: 90%;
            margin: auto;
        }

        .card {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        input {
            padding: 8px;
            margin: 5px;
            width: 18%;
        }

        button {
            padding: 10px 15px;
            border: none;
            background: #007bff;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #007bff;
            color: white;
            padding: 10px;
        }

        td {
            padding: 10px;
            text-align: center;
        }

        tr:nth-child(even) {
            background: #f2f2f2;
        }

        .delete {
            background: red;
        }

        .update {
            background: green;
        }
    </style>
</head>

<body>

<h1>📦 Warehouse Inventory System</h1>

<div class="container">

    <!-- ADD PRODUCT -->
    <div class="card">
        <h2>Add Product</h2>

        <form method="POST" action="/add">
            <input type="number" name="id" placeholder="ID" required>
            <input type="text" name="name" placeholder="Product Name" required>
            <input type="text" name="warehouse" placeholder="Warehouse" required>
            <input type="number" name="quantity" placeholder="Quantity" required>
            <input type="number" name="price" placeholder="Price" required>

            <button type="submit">Add Product</button>
        </form>
    </div>

    <!-- TABLE -->
    <div class="card">
        <h2>Product List</h2>

        <table>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Warehouse</th>
                <th>Quantity</th>
                <th>Price</th>
                <th>Actions</th>
            </tr>

            {% for row in data %}
            <tr>
                <td>{{ row[0] }}</td>
                <td>{{ row[1] }}</td>
                <td>{{ row[2] }}</td>
                <td>{{ row[3] }}</td>
                <td>₹{{ row[4] }}</td>
                <td>
                    <a href="/update/{{ row[0] }}">
                        <button class="update">Update</button>
                    </a>

                    <a href="/delete/{{ row[0] }}">
                        <button class="delete">Delete</button>
                    </a>
                </td>
            </tr>
            {% endfor %}

        </table>
    </div>

</div>

</body>
</html>
